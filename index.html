<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um pequeno detalhe para você</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.5);
            z-index: 10;
            max-width: 400px;
        }

        .bouquet {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            color: #590d22;
            font-size: 18px;
            line-height: 1.6;
            font-style: italic;
        }

        .heart {
            color: #ff4d6d;
            font-size: 20px;
        }

        /* Animação de pétalas caindo */
        .petal {
            position: absolute;
            background-color: #ffb3c1;
            border-radius: 150% 0 150% 0;
            opacity: 0.7;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="bouquet">💐</div>
        <h1>Para alguém especial...</h1>
        <p>"Flores são bonitas, mas nenhuma delas consegue ter o brilho que vejo no seu sorriso. Você é, de longe, a pessoa mais incrível que eu já conheci."</p>
        <div class="heart">❤❤❤</div>
    </div>

    <script>
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 3 + 2 + 's';
            petal.style.opacity = Math.random();
            
            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 5000);
        }

        setInterval(createPetal, 300);
    </script>
</body>
</html>
